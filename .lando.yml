name: celestial
recipe: wordpress
config:
  webroot: wordpress
  php: '8.2'
  database: mysql:8.0
env_file:
  - .env
services:
  appserver:
    overrides:
      volumes:
#        // TODO: Add each file and folder need for project
        - "./:/app/wordpress/wp-content/themes/celestial"
        - "/app/wordpress/wp-content/themes/celestial/wordpress/"
events:
  post-start:
    appserver: |
      composer install
      if ! wp core is-installed --path=wordpress; then
        wp config create --dbname=wordpress --dbuser=wordpress --dbpass=wordpress --dbhost=database --path=wordpress
        wp core install \
          --url=https://${PROJECT_NAME}.lndo.site/ \
          --title="${PROJECT_NAME}" \
          --admin_user=admin \
          --admin_password=password \
          --admin_email=admin@${PROJECT_NAME}.lndo.site \
          --path=wordpress
        wp theme activate celestial --path=wordpress
      fi
tooling:
  acorn:
    service: appserver
    cmd: wp --path=/app/wordpress acorn
